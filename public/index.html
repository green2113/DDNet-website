<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DDNet Required Login</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body data-page="index">
  <main class="container">
    <section class="hero">
      <h1>DDNet Account Gateway</h1>
      <p>Create an account, login, and issue your permanent <code>/login</code> code.</p>
    </section>

    <section class="card-grid">
      <article class="card">
        <h2>Register</h2>
        <p class="muted">Taiwan users can register directly. Non-Taiwan users need an invite code.</p>
        <form id="register-form" class="form">
          <label>Username
            <input name="username" type="text" minlength="3" maxlength="24" required />
          </label>
          <label>Email
            <input name="email" type="email" required />
          </label>
          <label>Password
            <input name="password" type="password" minlength="8" required />
          </label>
          <label>Invite Code (optional for TW)
            <input name="inviteCode" type="text" />
          </label>
          <button type="submit">Create account</button>
        </form>
      </article>

      <article class="card">
        <h2>Login</h2>
        <form id="login-form" class="form">
          <label>Email or Username
            <input name="identifier" type="text" required />
          </label>
          <label>Password
            <input name="password" type="password" required />
          </label>
          <button type="submit">Sign in</button>
        </form>
      </article>
    </section>

    <section id="result" class="result hidden"></section>
  </main>

  <script src="/app.js" defer></script>
</body>
</html>
