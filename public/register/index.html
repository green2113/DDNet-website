<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>회원가입 | DDNet Portal</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body data-page="register">
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <main class="auth-shell">
    <a class="mini-link" href="/">← 메인으로</a>
    <section class="panel auth-card">
      <p class="eyebrow">CREATE ACCOUNT</p>
      <h1>회원가입</h1>
      <p class="muted">대만 사용자는 바로 가입 가능, 그 외 국가는 초대코드가 필요합니다.</p>

      <form id="register-form" class="form">
        <label>아이디
          <input name="username" type="text" minlength="3" maxlength="24" required autocomplete="username" />
        </label>
        <label>이메일
          <input name="email" type="email" required autocomplete="email" />
        </label>
        <label>비밀번호
          <input name="password" type="password" minlength="8" required autocomplete="new-password" />
        </label>
        <label>초대코드 (해외 가입 시 필수)
          <input name="inviteCode" type="text" placeholder="예: ADMINTW1" />
        </label>
        <button class="btn" type="submit">계정 생성</button>
      </form>

      <p class="switch-line">이미 계정이 있으신가요? <a href="/login">로그인</a></p>
      <section id="result" class="result hidden"></section>
    </section>
  </main>

  <script src="/app.js" defer></script>
</body>
</html>
