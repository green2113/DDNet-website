<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>로그인 | DDNet Portal</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body data-page="login">
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <main class="auth-shell">
    <a class="mini-link" href="/">← 메인으로</a>
    <section class="panel auth-card">
      <p class="eyebrow">WELCOME BACK</p>
      <h1>로그인</h1>
      <p class="muted">등록된 이메일 또는 아이디로 로그인하세요.</p>

      <form id="login-form" class="form">
        <label>이메일 또는 아이디
          <input name="identifier" type="text" required autocomplete="username" />
        </label>
        <label>비밀번호
          <input name="password" type="password" required autocomplete="current-password" />
        </label>
        <button class="btn" type="submit">로그인</button>
      </form>

      <p class="switch-line">계정이 없으신가요? <a href="/register">회원가입</a></p>
      <section id="result" class="result hidden"></section>
    </section>
  </main>

  <script src="/app.js" defer></script>
</body>
</html>
